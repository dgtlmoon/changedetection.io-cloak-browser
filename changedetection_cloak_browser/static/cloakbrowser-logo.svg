<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <filter id="gs" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
    <radialGradient id="ghost-grad" cx="42%" cy="32%" r="62%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#6c3ff5"/>
    </radialGradient>
  </defs>

  <!-- Chrome wheel in greyscale -->
  <!-- Top segment -->
  <path d="M16,2 A14,14 0 0,1 28.12,23 L22.93,20 A8,8 0 0,0 16,8 Z" fill="#7a7a7a"/>
  <!-- Bottom-right segment -->
  <path d="M28.12,23 A14,14 0 0,1 3.88,23 L9.07,20 A8,8 0 0,0 22.93,20 Z" fill="#aaaaaa"/>
  <!-- Bottom-left segment -->
  <path d="M3.88,23 A14,14 0 0,1 16,2 L16,8 A8,8 0 0,0 9.07,20 Z" fill="#c8c8c8"/>
  <!-- Inner white ring -->
  <circle cx="16" cy="16" r="8" fill="#e6e6e6"/>
  <!-- Grey centre hub -->
  <circle cx="16" cy="16" r="6" fill="#959595"/>

  <!-- Ghost — bigger, coloured, in front -->
  <g filter="url(#gs)">
    <path d="M6,20 C6,9 26,9 26,20 L26,26 Q24,30 22,26 Q20,30 18,26 Q16,30 14,26 Q12,30 10,26 Q8,30 6,26 Z"
          fill="url(#ghost-grad)"/>
    <!-- Eyes: white sclera -->
    <circle cx="12.5" cy="19.5" r="2.4" fill="white"/>
    <circle cx="19.5" cy="19.5" r="2.4" fill="white"/>
    <!-- Pupils -->
    <circle cx="13" cy="19.9" r="1.2" fill="#1a0050"/>
    <circle cx="20" cy="19.9" r="1.2" fill="#1a0050"/>
    <!-- Eye shine -->
    <circle cx="12.4" cy="18.9" r="0.55" fill="white"/>
    <circle cx="19.4" cy="18.9" r="0.55" fill="white"/>
  </g>
</svg>
